# Build configuration per the current Astro-on-Netlify guide:
# https://docs.netlify.com/build/frameworks/framework-setup-guides/astro.md
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Node pin. Astro 6 requires Node >= 22.12; this pins the exact version the
  # site is developed and tested against. Variables set here are available to
  # builds only -- runtime secrets (session secret, admin hash, Anthropic key,
  # build hook URL) must be set in the Netlify UI or CLI so Functions receive
  # them. See README.
  NODE_VERSION = "22.22.2"

# AI valuation research worker: must run as a background function (15-minute
# budget); the synchronous 60-second limit kills real web-search research.
# Declared here in addition to the -background filename suffix and the
# function's in-source config.background.
[functions.ai-valuation-background]
  background = true
